---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  generation: 2
  labels:
    app: magnolia-author-backend
  name: magnolia-author-backend
  namespace: zb-schools
spec:
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  podManagementPolicy: OrderedReady
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: magnolia-author-backend
  serviceName: magnolia-author-backend-headless
  template:
    metadata:
      annotations:
        karpenter.sh/do-not-disrupt: "true"
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "sph-zb-schools-cms-vault-reader"
        vault.hashicorp.com/agent-inject-secret-db-config: "zb-schools/db/creds/zb-schools-db-role"
        vault.hashicorp.com/agent-inject-secret-kv-config: "zb-schools/kv/config"
        vault.hashicorp.com/agent-inject-secret-kv-aksk: "zb-schools/kv/aksk"
        vault.hashicorp.com/log-level: "debug"
        vault.hashicorp.com/namespace: "admin/engr/zb_schools/dev"
      creationTimestamp: null
      labels:
        app: magnolia-author-backend
    spec:
      tolerations:
        - key: dedicated
          operator: Equal
          value: mangolia-backend
          effect: NoSchedule
      nodeSelector:
        dedicated: "mangolia-backend"
      containers:
        - env:
            - name: TZ
              value: CST-8
            - name: BASE_URL
              value: "https://sit.zbschools.sg/authorFrontend"
            - name: ENV_TYPE
              value: "sit"
            - name: INSTANCE_TYPE
              value: "magnoliaAuthor"
          image: "767397694429.dkr.ecr.ap-southeast-1.amazonaws.com/sph/magnolia-author-backend"
          imagePullPolicy: IfNotPresent
          name: magolia-backend
          ports:
            - containerPort: 8080
              name: port8080
              protocol: TCP
          readinessProbe:
            failureThreshold: 30
            httpGet:
              path: >-
                /magnoliaAuthor/.resources/defaultMagnoliaLoginForm/img/logo-magnolia.gif
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 120
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          resources:
            limits:
              cpu: "4"
              memory: 12Gi
            requests:
              cpu: "4"
              memory: 12Gi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
          - mountPath: /usr/local/tomcat/webapps/repositories
            name: pvc-author
      dnsPolicy: ClusterFirst
      imagePullSecrets:
        - name: aws-ecr
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      serviceAccount: service-account-sph-zb-schools
      serviceAccountName: service-account-sph-zb-schools
  volumeClaimTemplates:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      creationTimestamp: null
      name: pvc-author
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
      storageClassName: gp3-ebs
      volumeMode: Filesystem 
---
apiVersion: v1
kind: Service
metadata:
  namespace: zb-schools
  name: magnolia-author-backend-svc
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app: magnolia-author-backend
  sessionAffinity: None
---
apiVersion: v1
kind: Service
metadata:
  name: magnolia-author-backend-headless
  namespace: zb-schools
spec:
  clusterIP: None
  ports:
  - name: author
    port: 8080
    protocol: TCP
    targetPort: 8080
  selector:
    app: magnolia-author-backend
