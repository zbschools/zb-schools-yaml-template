  name: magnolia-author-pdb
  namespace: zb-schools
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: magnolia-author-backend
      
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: author-frontend-pdb
  namespace: zb-schools
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: magnolia-author-frontend
---
apiVersion: policy/v1
