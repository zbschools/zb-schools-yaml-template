  name: public-frontend-pdb
  namespace: zb-schools
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: magnolia-public-frontend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: public-mobile-pdb
  namespace: zb-schools
